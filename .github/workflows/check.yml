name: Check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          # The Gradle 4.5 wrapper cannot run on newer JDKs
          distribution: temurin
          java-version: 8
          cache: gradle
      - name: Gradle check
        run: ./gradlew check
